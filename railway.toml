# Railway deployment config for HealthCare (Symfony)
# If your Git repo root is the parent folder, set Root Directory = "HealthCare" in Railway Settings.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
